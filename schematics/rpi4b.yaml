# Schematic for Raspberry Pi 4B 8GB
---
overlay:
  name: rpi_generic
  image: siderolabs/sbc-raspberrypi
  options:
    configTxtAppend: |
      dtoverlay=disable-bt
      dtoverlay=disable-wifi
      arm_boost=1
customization:
  systemExtensions:
    officialExtensions:
      - siderolabs/iscsi-tools
      - siderolabs/util-linux-tools
